.sync-to-github: &sync-to-github
  - name: 同步到 GitHub
    imports:
      - https://cnb.cool/Mintimate/secret/-/blob/main/SyncToGitHub.yml
    stages:
      - name: 自动同步代码
        image: tencentcom/git-sync
        settings:
          target_url: https://github.com/Mintimate/oh-my-rime-agent.git
          auth_type: https
          username: ${GIT_USERNAME}
          password: ${GIT_ACCESS_TOKEN}
          force: true

$:
  push: *sync-to-github
  tag_push: *sync-to-github
