<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>oh-my-rime Agent - 智能配置助理</title>
    <meta name="description" content="EdgeOne Makers 托管的 Rime 输入法智能配置助理，支持在线文档检索、配置补丁生成与自审。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        const mode = localStorage.getItem('rime_agent_theme_mode') || 'system';
        const dark = matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = mode === 'system' ? (dark ? 'dark' : 'light') : mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
